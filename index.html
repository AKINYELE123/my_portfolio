  <!-- App root -->
  <script type="text/babel">
    function App() {
      // Scroll reveal — IntersectionObserver
      const [tweaks, setTweak] = useTweaks(window.TWEAK_DEFAULTS);

      // Scroll reveal — IntersectionObserver. Reactive to content changes
      // (e.g. apps_count slider adds/removes cards) by reattaching observers.
      React.useEffect(() => {
        // Wait one frame so newly-rendered children are in the DOM
        const id = requestAnimationFrame(() => {
          const io = new IntersectionObserver((entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add('in');
                io.unobserve(e.target);
              }
            });
          }, { threshold: 0.05, rootMargin: '0px 0px -5% 0px' });

          // Tag direct section children as reveal targets if not already
          document.querySelectorAll('section > *').forEach((el) => {
            if (!el.classList.contains('reveal') && !el.classList.contains('reveal-skip')) {
              el.classList.add('reveal');
            }
          });

          // Anything in/near the viewport → instantly visible
          document.querySelectorAll('.reveal').forEach((el) => {
            if (el.classList.contains('in')) return;
            const r = el.getBoundingClientRect();
            if (r.top < window.innerHeight * 1.1) {
              el.classList.add('in');
            } else {
              io.observe(el);
            }
          });

          // Safety net: anything still hidden after 3s gets revealed
          const fallback = setTimeout(() => {
            document.querySelectorAll('.reveal:not(.in)').forEach((el) => {
              const r = el.getBoundingClientRect();
              if (r.top < window.innerHeight * 2) el.classList.add('in');
            });
          }, 3000);

          // Cleanup ref via closure
          window.__revealIO = io;
          window.__revealFallback = fallback;
        });
        return () => {
          cancelAnimationFrame(id);
          if (window.__revealIO) window.__revealIO.disconnect();
          if (window.__revealFallback) clearTimeout(window.__revealFallback);
        };
      }, [tweaks.apps_count]); // re-run when app count changes

      return (
        <window.ContentContext.Provider value={tweaks}>
          <Hero />
          <About />
          <Experience />
          <Apps />
          <FooterSection />
          <PageFooter />
          {/* <EditFAB />*/}
          {/* <EditPanel tweaks={tweaks} setTweak={setTweak} />*/}
        </window.ContentContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
